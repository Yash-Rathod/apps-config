apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-inference-stub-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Yash-Rathod/helm-charts.git
    targetRevision: main
    path: charts/ai-inference-stub
    helm:
      values: |
        image:
          repository: 347486023960.dkr.ecr.ap-south-1.amazonaws.com/ai-inference-stub
          tag: c6b2597
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
